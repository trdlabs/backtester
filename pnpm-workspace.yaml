packages:
  - "packages/*"
  - "apps/*"

# esbuild (pulled by vitest/tsx) runs a postinstall that links its platform binary. Approve it so
# `pnpm install` exits clean (in CI too).
allowBuilds:
  esbuild: true

minimumReleaseAgeExclude:
  - '@trdlabs/sdk@0.13.0'

# Don't re-run an install check before every `pnpm <script>`.
verifyDepsBeforeRun: false
