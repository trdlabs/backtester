name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Build and inspect public SDK
        run: |
          pnpm sdk:build
          pnpm sdk:pack
          pnpm sdk:verify
          SDK_VERSION="$(node -p "require('./packages/sdk/package.json').version")"
          pnpm exec tsx scripts/verify-sdk-clean-consumer.ts ".artifacts/sdk/trading-backtester-sdk-$SDK_VERSION.tgz"
