name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    # Postgres service so the pg-gated suites (store-factories.ts PG_AVAILABLE lane) actually run in CI
    # instead of skipping. Version matches production — platform/infra/docker-compose.yml uses
    # postgres:16-alpine. Each pg-*.test.ts creates a throwaway schema + migrate, so a single shared
    # database is enough.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trading_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Flips PG_AVAILABLE=true in test/store-factories.ts so every pg-gated suite runs (and gates).
      BACKTESTER_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/trading_test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Build and inspect public SDK
        run: |
          pnpm sdk:build
          pnpm sdk:pack
          pnpm sdk:verify
          SDK_VERSION="$(node -p "require('./packages/sdk/package.json').version")"
          pnpm exec tsx scripts/verify-sdk-clean-consumer.ts ".artifacts/sdk/trading-backtester-sdk-$SDK_VERSION.tgz"
