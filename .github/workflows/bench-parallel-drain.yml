name: Bench Parallel Drain

# Native-Linux serial-vs-parallel drain bench (perf #2). Runs the Docker-gated
# apps/backtester/test/bench-parallel-drain.test.ts on ubuntu-latest to measure whether the worker
# pool actually overlaps real sandboxed overlay runs (vs WSL2, where Docker start/IPC tax dominates).
#
# Trigger: push any `bench/**` branch (does NOT run the normal CI suite — ci.yml is main-only).

on:
  push:
    branches: ['bench/**']
  workflow_dispatch:
    inputs:
      n:
        description: 'Number of sandboxed runs (BENCH_N)'
        required: false
        default: '6'

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm sdk:build
      - run: pnpm run build:sandbox-harness-overlay
      - name: Pre-pull pinned sandbox image (exclude pull time from cold-start)
        run: docker pull node@sha256:242549cd46785b480c832479a730f4f2a20865d61ea2e404fdb2a5c3d3b73ecf
      - name: Run parallel-drain bench
        run: |
          set -o pipefail
          RUN_BENCH=1 BENCH_N=${{ github.event.inputs.n || '6' }} \
            pnpm exec vitest run apps/backtester/test/bench-parallel-drain.test.ts 2>&1 | tee bench-out.txt
      - name: Publish results to step summary
        if: always()
        run: |
          {
            echo '## Parallel drain — native Linux (ubuntu-latest)'
            echo "runner: $(uname -srm)"
            docker --version
            echo
            echo '```'
            sed -n '/PARALLEL DRAIN/,/===========/p' bench-out.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
